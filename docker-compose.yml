services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: flaky_gate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  api:
    build: .
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: flaky_gate
      DB_USER: postgres
      DB_PASSWORD: postgres
    volumes:
      - ./app:/app/app
